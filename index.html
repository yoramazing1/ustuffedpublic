      // Intercept fetch requests to rewrite image paths
      const originalFetch = window.fetch;
      window.fetch = function(...args) {
        let url = args[0];
        if (typeof url === 'string') {
          // Rewrite image paths from relative to CDN
          if (url.includes('/images/') || url.includes('images/')) {
            url = url.replace(/^\/images\//, 'https://cdn.jsdelivr.net/gh/yoramazing1/ustuffedpublic@main/images/');
            url = url.replace(/^images\//, 'https://cdn.jsdelivr.net/gh/yoramazing1/ustuffedpublic@main/images/');
          }
          if (url.includes('/logo') || url.includes('logo')) {
            url = url.replace(/logo\.svg/, 'https://cdn.jsdelivr.net/gh/yoramazing1/ustuffedpublic@main/logo.svg');
          }
          args[0] = url;
        }
        return originalFetch.apply(this, args);
      };

      // Also patch XMLHttpRequest
      const originalOpen = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function(method, url, ...rest) {
        if (typeof url === 'string') {
          if (url.includes('/images/') || url.includes('images/')) {
            url = url.replace(/^\/images\//, 'https://cdn.jsdelivr.net/gh/yoramazing1/ustuffedpublic@main/images/');
            url = url.replace(/^images\//, 'https://cdn.jsdelivr.net/gh/yoramazing1/ustuffedpublic@main/images/');

            url = url.replace(/logo\.svg/, 'https://cdn.jsdelivr.net/gh/yoramazing1/ustuffedpublic@main/logo.svg');
          }
        }
        return originalOpen.call(this, method, url, ...rest);
      };
